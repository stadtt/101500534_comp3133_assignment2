<app-header></app-header>


<section class="bg-slate-100 px-4 py-10">
  <div class="mx-auto w-full max-w-md rounded border border-slate-200 bg-white p-6">
    <h2 class="mb-6 text-center text-xl font-semibold text-blue-900">Signup</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="mb-1 block text-sm font-medium text-slate-700">Email</label>
        <input
          id="email"
          type="email"
          placeholder="Enter your email"
          formControlName="email"
          class="block w-full rounded border border-slate-300 px-3 py-2 text-slate-900 outline-none focus:border-blue-700"
        >
      </div>
      <div>
        <label for="username" class="mb-1 block text-sm font-medium text-slate-700">Username</label>
        <input
          id="username"
          type="text"
          placeholder="Enter your username"
          formControlName="username"
          class="block w-full rounded border border-slate-300 px-3 py-2 text-slate-900 outline-none focus:border-blue-700"
        >
      </div>

      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter your password"
          formControlName="password"
          class="block w-full rounded border border-slate-300 px-3 py-2 text-slate-900 outline-none focus:border-blue-700"
        >
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full rounded bg-blue-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-blue-800 disabled:cursor-not-allowed disabled:bg-slate-400"
      >
        Signup
      </button>
        @if (errorMessage) {
        <div class="text-center text-sm text-red-600" aria-live="polite">
          {{ errorMessage }}
        </div>
      }
    </form>
  </div>
</section>
