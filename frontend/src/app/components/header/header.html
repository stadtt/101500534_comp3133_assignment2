<header class="bg-blue-900 text-white">
	<div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 sm:px-6">
		<a routerLink="/" class="text-base font-semibold tracking-wide text-white no-underline">
			Employee Management
		</a>

		<nav class="flex items-center gap-1" aria-label="Primary navigation">
			<a
				routerLink="/"
				routerLinkActive="bg-blue-700"
				[routerLinkActiveOptions]="{ exact: true }"
				class="rounded px-3 py-2 text-sm text-blue-100 transition hover:bg-blue-800 hover:text-white"
			>
				Home
			</a>
			<a
				routerLink="/admin-view"
				routerLinkActive="bg-blue-700"
				class="rounded px-3 py-2 text-sm text-blue-100 transition hover:bg-blue-800 hover:text-white"
			>
				Admin
			</a>
			<a
				routerLink="/login"
				routerLinkActive="bg-blue-700"
				class="rounded px-3 py-2 text-sm text-blue-100 transition hover:bg-blue-800 hover:text-white"
			>
				Login
			</a>
			<a
				routerLink="/signup"
				routerLinkActive="bg-blue-700"
				class="rounded px-3 py-2 text-sm text-blue-100 transition hover:bg-blue-800 hover:text-white"
			>
				Sign Up
			</a>
		</nav>
	</div>
</header>
